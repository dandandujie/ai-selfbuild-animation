      const MAP_DATA_SCALE = 10;

      function mulberry32(seed) {
        return function random() {
          seed |= 0;
          seed = seed + 0x6d2b79f5 | 0;
          let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
          t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
          return ((t ^ t >>> 14) >>> 0) / 4294967296;

      function clamp(value, min = 0, max = 1) {
        return Math.max(min, Math.min(max, value));

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - clamp(value), 3);
      }

      function easeInOutCubic(value) {
        const clamped = clamp(value);
        return clamped * clamped * clamped * (clamped * (clamped * 6 - 15) + 10);
      }

      function cubicPoint(points, progress) {
        const inverse = 1 - progress;
        const a = inverse * inverse * inverse;
        const b = 3 * inverse * inverse * progress;
        const c = 3 * inverse * progress * progress;
        const d = progress * progress * progress;
        return {
          x: points[0].x * a + points[1].x * b + points[2].x * c + points[3].x * d,
          y: points[0].y * a + points[1].y * b + points[2].y * c + points[3].y * d,
        };

      function makeCanvas(width, height = width) {
        const item = document.createElement("canvas");
        item.width = width;
        item.height = height;
        return item;

      function geoDistanceRadians(a, b) {
        const latA = a.lat * DEG_TO_RAD;
        const latB = b.lat * DEG_TO_RAD;
        const deltaLat = (b.lat - a.lat) * DEG_TO_RAD;
        const deltaLon = (b.lon - a.lon) * DEG_TO_RAD;
        const sinLat = Math.sin(deltaLat / 2);
        const sinLon = Math.sin(deltaLon / 2);
        const value = sinLat * sinLat + Math.cos(latA) * Math.cos(latB) * sinLon * sinLon;
        return 2 * Math.atan2(Math.sqrt(value), Math.sqrt(Math.max(0, 1 - value)));
      }

      function stableGeoHash(lat, lon, salt = 0) {
        const a = Math.round((lat + 90) * 100);
        const b = Math.round((lon + 180) * 100);
        return (Math.imul(a + 17 + salt, 73856093) ^ Math.imul(b + 31 + salt, 19349663)) >>> 0;
      }

      function decodeMapDots(pairs, salt = 0) {
        const dots = [];
        for (let i = 0; i < pairs.length; i += 2) {
          const lat = pairs[i] / MAP_DATA_SCALE;
          const lon = pairs[i + 1] / MAP_DATA_SCALE;
          const hash = stableGeoHash(lat, lon, salt);
          dots.push({
            lat,
            lon,
            twinkle: ((hash >>> 8) & 255) / 255,
          });
        }
        return dots;
      }

      function buildEarthDots() {
        return decodeMapDots(MAP_DATA.worldLand || [], 11);
      }

      function buildEarthBorderDots() {
        return decodeMapDots(MAP_DATA.worldBorders || [], 17);
      }

      function getCountryMap(country) {
        if (countryMapCache.has(country)) return countryMapCache.get(country);
        const raw = (MAP_DATA.countries || {})[country] || {};
        const map = {
          fill: decodeMapDots(raw.fill || [], 23),
          outline: decodeMapDots(raw.outline || [], 29),
        };
        countryMapCache.set(country, map);
        return map;
      }

      function normalizeLongitude(lon, centerLon) {
        return ((lon - centerLon + 540) % 360) - 180;
      }

      function shortestLongitudeDelta(from, to) {
        return ((to - from + 540) % 360) - 180;
      }

      function getGlobeCenterLat(location) {
        return clamp(location.lat * 0.65, -32, 32);
      }

      function getGlobeTarget(theme) {
        const location = theme.location || { lat: 0, lon: 0 };
        return {
          lon: location.lon,
          lat: getGlobeCenterLat(location),
        };
      }

      function getCurrentGlobeView(time = performance.now()) {
        if (!state.globeRotationStartedAt) {
          return { lon: state.globeLon, lat: state.globeLat };
        }
        const progress = clamp((time - state.globeRotationStartedAt) / state.globeRotationDuration);
        if (progress >= 1) {
          state.globeRotationStartedAt = 0;
          state.globeLon = state.globeTargetLon;
          state.globeLat = state.globeTargetLat;
          state.globeSpinDelta = 0;
          return { lon: state.globeLon, lat: state.globeLat };
        }
        const eased = easeInOutCubic(progress);
        return {
          lon: state.globeFromLon + state.globeSpinDelta * eased,
          lat: state.globeFromLat + (state.globeTargetLat - state.globeFromLat) * eased,
        };
      }

      function setGlobeTarget(theme, time = performance.now(), animate = true) {
        const target = getGlobeTarget(theme);
        const current = getCurrentGlobeView(time);
        state.globeFromLon = current.lon;
        state.globeFromLat = current.lat;
        state.globeTargetLon = target.lon;
        state.globeTargetLat = target.lat;
        if (!animate) {
          state.globeRotationStartedAt = 0;
          state.globeLon = target.lon;
          state.globeLat = target.lat;
          state.globeSpinDelta = 0;
          return;
        }
        const directDelta = shortestLongitudeDelta(current.lon, target.lon);
        state.globeSpinDelta = directDelta;
        state.globeRotationDuration = clamp(920 + Math.abs(directDelta) * 2.8, 920, 1460);
        state.globeRotationStartedAt = time;
      }

      function getParticleMapLayout(time = performance.now()) {
        const desktop = state.width >= 992;
        const globe = getCurrentGlobeView(time);
        const radius = desktop
          ? Math.min(state.width * 0.31, state.height * 0.39)
          : Math.min(state.width * 0.54, state.height * 0.29);
        return {
          centerX: desktop ? state.width * 0.36 : state.width * 0.5,
          centerY: desktop ? state.height * 0.43 : state.height * 0.37,
          centerLat: globe.lat,
          centerLon: globe.lon,
          radius,
          width: radius * 2,
          height: radius * 2,
        };
      }

      function projectMapPoint(lat, lon, layout) {
        const latRad = lat * DEG_TO_RAD;
        const lonRad = normalizeLongitude(lon, layout.centerLon) * DEG_TO_RAD;
        const centerLatRad = layout.centerLat * DEG_TO_RAD;
        const sinLat = Math.sin(latRad);
        const cosLat = Math.cos(latRad);
        const sinCenter = Math.sin(centerLatRad);
        const cosCenter = Math.cos(centerLatRad);
        const cosLon = Math.cos(lonRad);
        const z = sinCenter * sinLat + cosCenter * cosLat * cosLon;
        if (z <= -0.02) return null;
        const x = layout.centerX + layout.radius * cosLat * Math.sin(lonRad);
        const y = layout.centerY - layout.radius * (cosCenter * sinLat - sinCenter * cosLat * cosLon);
        const edgeFade = clamp((z + 0.02) / 0.22);
        return {
          x,
          y,
          z,
          edgeFade,
        };
      }

      function drawGlobeShell(layout, color) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.022;
        ctx.beginPath();
        ctx.arc(layout.centerX, layout.centerY, layout.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.16;
        ctx.lineWidth = 1.2;
        ctx.setLineDash([1, 7]);
        ctx.beginPath();
        ctx.arc(layout.centerX, layout.centerY, layout.radius, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.stroke();
        ctx.restore();
      }

      function drawMapGuideDots(layout, color) {
        ctx.fillStyle = color;
        for (let lat = -60; lat <= 60; lat += 30) {
          for (let lon = -180; lon <= 180; lon += 2.6) {
            const point = projectMapPoint(lat, lon, layout);
            if (!point) continue;
            ctx.globalAlpha = (lat === 0 ? 0.12 : 0.07) * point.edgeFade;
            ctx.fillRect(Math.round(point.x), Math.round(point.y), 1.2, 1.2);
          }
        }
        for (let lon = -150; lon <= 150; lon += 30) {
          for (let lat = -72; lat <= 72; lat += 2.8) {
            const point = projectMapPoint(lat, lon, layout);
            if (!point) continue;
            ctx.globalAlpha = 0.062 * point.edgeFade;
            ctx.fillRect(Math.round(point.x), Math.round(point.y), 1.1, 1.1);
          }
        }
      }

      function drawDotField(dots, layout, color, alpha, size, time, twinkle = 0.08) {
        ctx.fillStyle = color;
        for (const dot of dots) {
          const projected = projectMapPoint(dot.lat, dot.lon, layout);
          if (!projected) continue;
          const pulse = 1 - twinkle / 2 + Math.sin(time * 0.0012 + dot.twinkle * 6.28) * twinkle;
          ctx.globalAlpha = alpha * pulse * projected.edgeFade * (0.76 + projected.z * 0.24);
          ctx.fillRect(Math.round(projected.x), Math.round(projected.y), size, size);
        }
      }

      function drawCountryMap(location, layout, color, time) {
        const countryMap = getCountryMap(location.country);

      function drawCityMarker(location, layout, color, active, time) {

      function roundedPath(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.lineTo(x + width - r, y);
        context.quadraticCurveTo(x + width, y, x + width, y + r);
        context.lineTo(x + width, y + height - r);
        context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        context.lineTo(x + r, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - r);
        context.lineTo(x, y + r);
        context.quadraticCurveTo(x, y, x + r, y);
        context.closePath();
      }

      function drawSymbolMask(context, symbol) {
        const icon = ICONS[symbol] || ICONS.anthropic;
        if (icon.appIcon) {
          const cutoutPadding = icon.cutoutPadding || 0;
          const cutoutScale = (152 - 2 * cutoutPadding) / icon.viewBox;
          const cutoutMatrix = new DOMMatrix()
            .translate(cutoutPadding + (icon.cutoutOffsetX || 0), cutoutPadding + (icon.cutoutOffsetY || 0))
            .scale(cutoutScale, cutoutScale);

          context.save();
          context.fillStyle = "#000";
          roundedPath(context, 0, 0, 152, 152, icon.radius || 28);
          context.fill();
          context.globalCompositeOperation = "destination-out";
          for (const pathData of icon.cutoutPaths) {
            const path = new Path2D(pathData);
            const transformed = new Path2D();
            transformed.addPath(path, cutoutMatrix);
            context.fill(transformed, icon.cutoutFillRule || "nonzero");
          }
          context.restore();
          return;
        }

        const padding = icon.padding || 0;
        const scale = (152 - 2 * padding) / icon.viewBox;
        const matrix = new DOMMatrix()
          .translate(padding + (icon.offsetX || 0), padding + (icon.offsetY || 0))
          .scale(scale, scale);
        const paths = icon.paths.map((pathData) => {
          const path = new Path2D(pathData);
          const transformed = new Path2D();
          transformed.addPath(path, matrix);
          return transformed;
        });

        context.save();
        context.fillStyle = "#000";
        context.strokeStyle = "#000";
        context.lineCap = "round";
        context.lineJoin = "round";
        for (const path of paths) {
          context.fill(path, icon.fillRule || "nonzero");
        }
        if (icon.strokeCut) {
          context.globalCompositeOperation = "destination-out";
          context.lineWidth = icon.strokeCut;
          for (const path of paths) {
            context.stroke(path);
          }
        }
        context.restore();
      }

      function buildShapeCells(theme) {
        const mask = makeCanvas(152);
        const maskContext = mask.getContext("2d", { willReadFrequently: true });
        drawSymbolMask(maskContext, theme.symbol);

        const pixels = maskContext.getImageData(0, 0, 152, 152).data;
        const cells = [];
        for (let row = 0; row < 19; row += 1) {
          for (let col = 0; col < 19; col += 1) {
            let filled = 0;
            for (let py = 0; py < 8; py += 1) {
              for (let px = 0; px < 8; px += 1) {
                const alpha = pixels[((row * 8 + py) * 152 + (col * 8 + px)) * 4 + 3];
                if (alpha > 8) filled += 1;
              }
            }
            if (filled >= 11.52) {
              const dx = col - 9;
              const dy = row - 9;
              cells.push({ idx: row * 19 + col, gx: col, gy: row, dist: Math.hypot(dx, dy) });
            }
          }
        }
        if (!cells.length) {
          cells.push({ idx: 180, gx: 9, gy: 9, dist: 0 });
        }
        cells.sort((a, b) => a.dist - b.dist || a.idx - b.idx);
        return cells;
      }

      function buildNameCells(theme) {
        const columns = 132;
        const rows = 58;
        const cellSize = 10;
        const mask = makeCanvas(columns * cellSize, rows * cellSize);
        const maskContext = mask.getContext("2d", { willReadFrequently: true });
        const modelText = theme.modelName || theme.label;
        const makerText = theme.makerName || theme.label;

        maskContext.fillStyle = "#000";
        maskContext.textAlign = "left";
        maskContext.textBaseline = "alphabetic";
        drawFittedSerifText(maskContext, modelText, cellSize, cellSize * 20.2, {
          fontSize: modelText.length > 7 ? 150 : 176,
          minFontSize: 92,
          weight: 400,
          maxWidth: mask.width * 0.94,
        });
        if (theme.makerSymbol && MAKER_MARKS[theme.makerSymbol]) {
          drawMakerMark(maskContext, theme.makerSymbol, cellSize, cellSize * 35.4, 128, mask.width * 0.32);
        } else {
          drawFittedSerifText(maskContext, makerText, cellSize, cellSize * 40.5, {
            fontSize: makerText.length > 8 ? 76 : 88,
            minFontSize: 44,
            weight: 400,
            maxWidth: mask.width * 0.78,
          });
        }

        const pixels = maskContext.getImageData(0, 0, mask.width, mask.height).data;
        const cells = [];
        sampleNameCells(cells, pixels, mask.width, {
          section: "model",
          columns,
          rows,
          cellSize,
          sampleSize: cellSize / 2,
          yStart: 0,
          yEnd: Math.floor(rows * cellSize * 0.49),
          alphaThreshold: 48,
          filledThreshold: 3,
          sizeScale: 0.34,
          delayOffset: 0,
          delayStep: 12,
        });
        sampleNameCells(cells, pixels, mask.width, {
          section: "maker",
          columns,
          rows,
          cellSize,
          sampleSize: cellSize / 2,
          yStart: Math.floor(rows * cellSize * 0.49),
          yEnd: rows * cellSize,
          alphaThreshold: 44,
          filledThreshold: 3,
          sizeScale: 0.31,
          delayOffset: 260,
          delayStep: 14,
        });
        return { columns, rows, cells };
      }

      function sampleNameCells(cells, pixels, maskWidth, options) {
        const {
          columns,
          rows,
          cellSize,
          sampleSize,
          yStart,
          yEnd,
          alphaThreshold,
          filledThreshold,
          sizeScale,
          delayOffset,
          delayStep,
          section,
        } = options;
        for (let y = yStart; y < yEnd; y += sampleSize) {
          for (let x = 0; x < columns * cellSize; x += sampleSize) {
            let filled = 0;
            for (let py = 0; py < sampleSize; py += 1) {
              for (let px = 0; px < sampleSize; px += 1) {
                const alpha = pixels[((y + py) * maskWidth + x + px) * 4 + 3];
                if (alpha > alphaThreshold) filled += 1;
              }
            }
            if (filled >= filledThreshold) {
              const cx = (x + sampleSize / 2) / cellSize;
              const cy = (y + sampleSize / 2) / cellSize;
              const cellCol = Math.floor(cx);
              const cellRow = Math.floor(cy);
              const centeredRow = cy - rows / 2;
              cells.push({
                idx: cellRow * columns + cellCol,
                cx,
                cy,
                section,
                sizeScale,
                delay: cx * delayStep + Math.abs(centeredRow) * 10 + delayOffset + (Math.imul(cellCol + 17, cellRow + 31) & 63),
              });
            }
          }
        }
      }

      function drawFittedSerifText(context, text, x, baseline, options) {
        let size = options.fontSize;
        do {
          context.font = `${options.weight} ${size}px ${TITLE_FONT}`;
          size -= 4;
        } while (size > options.minFontSize && context.measureText(text).width > options.maxWidth);
        context.fillText(text, x, baseline);
      }

      function drawMakerMark(context, markId, x, centerY, height, maxWidth) {
        const mark = MAKER_MARKS[markId];
        const scale = Math.min(height / mark.viewBoxHeight, maxWidth / mark.viewBoxWidth);
        const matrix = new DOMMatrix()
          .translate(x, centerY - mark.viewBoxHeight * scale / 2)
          .scale(scale, scale);

        for (const pathData of mark.paths) {
          const path = new Path2D(pathData);
          const transformed = new Path2D();
          transformed.addPath(path, matrix);
          context.fill(transformed, mark.fillRule || "nonzero");
        }
      }

      function centeredComponentSeed(component) {
        let best = component[0];
        let bestScore = Infinity;
        for (const idx of component) {
          const dx = idx % 19 - 9;
          const dy = Math.floor(idx / 19) - 9;
          const score = Math.hypot(dx, dy);
          if (score < bestScore) {
            best = idx;
            bestScore = score;
          }
        }
        return best;
      }

      function computeGrowthSeeds() {
        const visited = new Set();
        const components = [];
        for (const cell of shapeCells) {
          if (visited.has(cell.idx)) continue;
          const component = [];
          const queue = [cell.idx];
          visited.add(cell.idx);
          for (let head = 0; head < queue.length; head += 1) {
            const idx = queue[head];
            component.push(idx);
            for (const next of neighbors(idx)) {
              if (!visited.has(next)) {
                visited.add(next);
                queue.push(next);
              }
            }
          }
          components.push(component);
        }
        components.sort((a, b) => b.length - a.length);
        return components.map(centeredComponentSeed);
      }

      function computeTotalReachable(seeds) {
        const seen = new Set();
        const queue = [];
        for (const seed of seeds) {
          if (shapeSet.has(seed) && !seen.has(seed)) {
            seen.add(seed);
            queue.push(seed);
          }
        }
        for (let head = 0; head < queue.length; head += 1) {
          for (const next of neighbors(queue[head])) {
            if (!seen.has(next)) {
              seen.add(next);
              queue.push(next);
            }
          }
        }
        return seen.size || shapeCells.length;
      }

      function setDocumentTheme() {
        palette = {
          paper: activeTheme.paper,
          grid: activeTheme.grid,
        };
        document.documentElement.style.setProperty("--paper", activeTheme.paper);
        document.documentElement.style.setProperty("--panel", activeTheme.panel);
        document.documentElement.style.setProperty("--panel-border", activeTheme.panelBorder);
        document.documentElement.style.setProperty("--panel-text", activeTheme.panelText);
        document.documentElement.style.setProperty("--active-bg", activeTheme.activeBg);
        document.documentElement.style.setProperty("--active-text", activeTheme.activeText);
      }

      function rebuildThemeAssets() {
        random = mulberry32(activeTheme.seed);
        shapeCells = buildShapeCells(activeTheme);
        shapeSet = new Set(shapeCells.map((cell) => cell.idx));
        nameGrid = buildNameCells(activeTheme);
        nameCells = nameGrid.cells;
        growthSeeds = computeGrowthSeeds();
        totalReachable = computeTotalReachable(growthSeeds);
        textures = Array.from({ length: 12 }, (_, index) => makeTexture(index + 1));
        tileSprites = Array.from({ length: 8 }, (_, index) => makeTileSet(index + 1));
        agentSprite = makeMipMaps(makeGridSprite(608, shapeCells, shapeCells.length, 199));
        shadowSprite = makeMipMaps(makeShadowTile());
      }

      function applyTheme(themeId, restart = true) {
        const nextTheme = THEMES.find((theme) => theme.id === themeId);
        if (!nextTheme) return;
        const now = performance.now();
        setGlobeTarget(nextTheme, now, restart);
        activeTheme = nextTheme;
        setDocumentTheme();
        rebuildThemeAssets();
        if (restart) {
          resetAnimation(now, false, true);
          draw(now);
        }
      }

      function captureTransitionFrame(time) {
        if (!state.width || !state.height) return;
        state.transitionCanvas = makeCanvas(canvas.width, canvas.height);
        state.transitionCanvas.getContext("2d").drawImage(canvas, 0, 0);
        state.transitionStartedAt = time;
      }

      function rotateTheme(time) {
        const activeIndex = THEMES.findIndex((theme) => theme.id === activeTheme.id);
        const nextTheme = THEMES[(activeIndex + 1) % THEMES.length];
        setGlobeTarget(nextTheme, time, true);
        activeTheme = nextTheme;
        setDocumentTheme();
        rebuildThemeAssets();
        resetAnimation(time, false, false);
      }

      function neighbors(idx) {
        const col = idx % 19;
        const row = Math.floor(idx / 19);
        const result = [];
        for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
          const nextCol = col + dx;
          const nextRow = row + dy;
          const next = nextRow * 19 + nextCol;
          if (nextCol >= 0 && nextRow >= 0 && nextCol < 19 && nextRow < 19 && shapeSet.has(next)) {
            result.push(next);
          }
        }
        return result;
      }

      function makeTexture(seed) {
        const rand = mulberry32(9301 * seed + 49297);
        const tileColors = activeTheme.tileColors;
        const tile = makeCanvas(128);
        const tileContext = tile.getContext("2d");
        tileContext.globalAlpha = 0.9;
        tileContext.fillStyle = tileColors[Math.floor(rand() * tileColors.length)];
        tileContext.fillRect(0, 0, 128, 128);

        for (let i = 0; i < 5; i += 1) {
          const x = 128 * rand();
          const y = 128 * rand();
          const radius = 128 * (0.25 + 0.35 * rand());
          const gradient = tileContext.createRadialGradient(x, y, 0, x, y, radius);
          gradient.addColorStop(0, tileColors[Math.floor(rand() * tileColors.length)]);
          gradient.addColorStop(1, "rgba(0,0,0,0)");
          tileContext.globalAlpha = 0.14 + 0.14 * rand();
          tileContext.fillStyle = gradient;
          tileContext.fillRect(0, 0, 128, 128);
        }

        tileContext.globalAlpha = 0.07;
        for (let i = 0; i < 220; i += 1) {
          const size = 1 + 2 * rand();
          tileContext.fillStyle = tileColors[Math.floor(rand() * tileColors.length)];
          tileContext.fillRect(128 * rand(), 128 * rand(), size, size);
        }

        tileContext.globalAlpha = 0.14;
        tileContext.strokeStyle = activeTheme.solidColors[0];
        tileContext.lineWidth = 6.4;
        tileContext.shadowColor = activeTheme.solidColors[0];
        tileContext.shadowBlur = 12.8;
        roundedPath(tileContext, 8.96, 8.96, 110.08, 110.08, 25.6);
        tileContext.stroke();
        tileContext.shadowBlur = 0;
        tileContext.globalAlpha = 1;

        tileContext.globalCompositeOperation = "destination-in";
        tileContext.fillStyle = "#000";
        tileContext.beginPath();
        const wobbleA = rand() * Math.PI * 2;
        const wobbleB = rand() * Math.PI * 2;
        const wobbleC = rand() * Math.PI * 2;
        for (let step = 0; step <= 56; step += 1) {
          const angle = step / 56 * Math.PI * 2;
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          const squareRadius = 1 / Math.pow(cos ** 4 + sin ** 4, 0.25);
          const radius = squareRadius * 58.88 * (1 + 0.03 * Math.sin(3 * angle + wobbleA) + 0.018 * Math.sin(7 * angle + wobbleB) + 0.01 * Math.sin(11 * angle + wobbleC));
          const x = 64 + cos * radius;
          const y = 64 + sin * radius;
          if (step === 0) tileContext.moveTo(x, y);
          else tileContext.lineTo(x, y);
        }
        tileContext.closePath();
        tileContext.fill();
        tileContext.globalCompositeOperation = "source-over";
        return tile;
      }

      function makeMipMaps(source) {
        const levels = [source];
        let current = source;
        while (current.width > 38) {
          const nextSize = Math.max(19, current.width >> 1);
          const next = makeCanvas(nextSize);
          const nextContext = next.getContext("2d");
          nextContext.imageSmoothingEnabled = true;
          nextContext.imageSmoothingQuality = "high";
          nextContext.drawImage(current, 0, 0, nextSize, nextSize);
          levels.push(next);
          current = next;
        }
        return levels;
      }

      function pickMipMap(levels, size) {
        for (let i = levels.length - 1; i >= 0; i -= 1) {
          if (levels[i].width >= size) return levels[i];
        }
        return levels[0];
      }

      function drawTexture(context, x, y, size, seed) {
        const texture = textures[seed % textures.length];
        context.save();
        context.translate(x + size / 2, y + size / 2);
        context.scale((seed >> 4) & 1 ? -1 : 1, (seed >> 5) & 1 ? -1 : 1);
        context.drawImage(texture, -size / 2, -size / 2, size, size);
        context.restore();
      }

      function makeGridOrder(seed) {
        const rand = mulberry32(0x9e3779b1 * seed >>> 0);
        const index = (x, y) => 19 * y + x;
        const added = new Set();
        const cells = [];
        const frontier = [];
        const add = (x, y) => {
          const idx = index(x, y);
          if (added.has(idx)) return false;
          added.add(idx);
          cells.push({ gx: x, gy: y });
          return true;
        };
        const addFrontier = (x, y) => {
          for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
            const nextX = x + dx;
            const nextY = y + dy;
            if (nextX >= 0 && nextY >= 0 && nextX < 19 && nextY < 19 && !added.has(index(nextX, nextY))) {
              frontier.push({ gx: nextX, gy: nextY });
            }
          }
        };

        add(9, 9);
        for (let arm = 0; arm < 5 + Math.floor(3 * rand()); arm += 1) {
          let x = 9;
          let y = 9;
          for (let step = 0; step < 38; step += 1) {
            const options = [[1, 0], [-1, 0], [0, 1], [0, -1]].filter(([dx, dy]) => {
              const nextX = x + dx;
              const nextY = y + dy;
              return nextX >= 0 && nextY >= 0 && nextX < 19 && nextY < 19 && !added.has(index(nextX, nextY));
            });
            if (!options.length) break;
            let chosen = options[0];
            let score = -Infinity;
            for (const option of options) {
              const optionScore = Math.hypot(x + option[0] - 9, y + option[1] - 9) + 1.2 * rand();
              if (optionScore > score) {
                score = optionScore;
                chosen = option;
              }
            }
            x += chosen[0];
            y += chosen[1];
            add(x, y);
            if (x === 0 || y === 0 || x === 18 || y === 18) break;
          }
        }

        for (const cell of cells) addFrontier(cell.gx, cell.gy);
        while (cells.length < 361 && frontier.length) {
          const picked = Math.floor(rand() * frontier.length);
          const next = frontier[picked];
          frontier[picked] = frontier[frontier.length - 1];
          frontier.pop();
          if (next && add(next.gx, next.gy)) addFrontier(next.gx, next.gy);
        }
        return cells;
      }

      function makeGridSprite(size, order, count, seed) {
        const sprite = makeCanvas(size);
        const spriteContext = sprite.getContext("2d");
        const gap = size / 19;
        const tileSize = 0.78 * gap;
        const offset = (gap - tileSize) / 2;
        for (let i = 0; i < count && i < order.length; i += 1) {
          const cell = order[i];
          const textureSeed = (0x466f45d * cell.gx ^ 0x127409f * cell.gy ^ 0x4f9ffb7 * seed) >>> 0;
          drawTexture(spriteContext, cell.gx * gap + offset, cell.gy * gap + offset, tileSize, textureSeed);
        }
        spriteContext.globalCompositeOperation = "destination-in";
        spriteContext.fillStyle = "#000";
        roundedPath(spriteContext, 0, 0, size, size, 0.18 * size);
        spriteContext.fill();
        return sprite;
      }

      function makeSolidTile(seed) {
        const rand = mulberry32(0x165667b1 * seed >>> 0);
        const solidColors = activeTheme.solidColors;
        const tile = makeCanvas(152);
        const tileContext = tile.getContext("2d");
        roundedPath(tileContext, 0, 0, 152, 152, 27.36);
        tileContext.fillStyle = solidColors[seed % solidColors.length];
        tileContext.fill();
        tileContext.save();
        tileContext.clip();
        for (let i = 0; i < 4; i += 1) {
          const x = 152 * rand();
          const y = 152 * rand();
          const radius = 152 * (0.35 + 0.35 * rand());
          const gradient = tileContext.createRadialGradient(x, y, 0, x, y, radius);
          gradient.addColorStop(0, solidColors[Math.floor(rand() * solidColors.length)]);
          gradient.addColorStop(1, "rgba(0,0,0,0)");
          tileContext.globalAlpha = 0.22;
          tileContext.fillStyle = gradient;
          tileContext.fillRect(0, 0, 152, 152);
        }
        tileContext.restore();
        tileContext.globalAlpha = 1;
        return tile;
      }

      function makeShadowTile() {
        const tile = makeCanvas(152);
        const tileContext = tile.getContext("2d");
        tileContext.fillStyle = "#11100e";
        roundedPath(tileContext, 0, 0, 152, 152, 27.36);
        tileContext.fill();
        return tile;
      }

      function makeTileSet(seed) {
        const order = makeGridOrder(seed);
        return {
          full: makeMipMaps(makeGridSprite(608, order, 361, seed)),
          flip: Array.from({ length: 8 }, (_, frame) => makeGridSprite(152, order, Math.ceil((frame + 1) / 8 * 361), seed)),
          solid: makeSolidTile(seed),
        };
      }

      function resetAnimation(time, final = false, restart = true) {
        if (restart) {
          random = mulberry32(activeTheme.seed);
          state.cycle = final ? state.phaseCycles - 1 : 0;
          state.zoom = (state.cycle + (final ? 0.3 : -0.04)) * zoomSpan;
          state.zoomVelocity = 0;
        }
        state.cells = new Map();
        state.agents = [];
        state.startedAt = time;
        state.lastTick = time;
        state.doneAt = 0;
        state.ticks = 0;
        state.lastFrameTime = time;
        if (final) {
          for (const cell of shapeCells) state.cells.set(cell.idx, time - 2400);
          state.doneAt = time;
        } else {
          for (const seed of growthSeeds) {
            spawnAgent(seed, time, true);
          }
        }
      }

      function spawnAgent(idx, time, instant = false) {
        state.agents.push({ idx, prev: idx, since: time, bornAt: instant ? -Infinity : time, dieAt: 0 });
      }

      function frontierCells(liveSet) {
        const frontier = [];
        const seen = new Set();
        for (const idx of state.cells.keys()) {
          for (const next of neighbors(idx)) {
            if (!state.cells.has(next) && !liveSet.has(next) && !seen.has(next)) {
              seen.add(next);
              frontier.push(next);
            }
          }
        }
        return frontier;
      }

      function advanceGrowth(time) {
        if (state.doneAt) return;
        while (time - state.lastTick >= 450) {
          state.lastTick += 450;
          state.ticks += 1;
          const tickTime = state.lastTick;
          const liveSet = new Set(state.agents.filter((agent) => !agent.dieAt).map((agent) => agent.idx));
          const nextAgents = [];

          for (const agent of state.agents) {
            if (agent.dieAt) {
              if (tickTime - agent.dieAt < 350) nextAgents.push(agent);
              continue;
            }

            const options = neighbors(agent.idx).filter((idx) => !state.cells.has(idx) && !liveSet.has(idx));
            state.cells.set(agent.idx, tickTime);
            if (!options.length) {
              agent.dieAt = tickTime;
              nextAgents.push(agent);
              continue;
            }

            const next = options[Math.floor(random() * options.length)];
            agent.prev = agent.idx;
            agent.idx = next;
            agent.since = tickTime;
            liveSet.add(next);
            nextAgents.push(agent);
          }

          state.agents = nextAgents;
          const active = state.agents.filter((agent) => !agent.dieAt).length;
          const frontier = frontierCells(liveSet);
          const phaseCycle = state.cycle % state.phaseCycles;
          const speed = 7 / (1 + 0.25 * phaseCycle);
          const targetAgents = Math.min(48, Math.max(1, Math.floor((state.ticks / speed) ** 2)));
          for (let count = active; count < targetAgents && frontier.length; count += 1) {
            const picked = Math.floor(random() * frontier.length);
            const idx = frontier[picked];
            frontier[picked] = frontier[frontier.length - 1];
            frontier.pop();
            spawnAgent(idx, tickTime, false);
            liveSet.add(idx);
          }

          if (!frontier.length && !state.agents.some((agent) => !agent.dieAt)) {
            state.doneAt = tickTime;
            break;
          }
        }
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        state.width = Math.max(1, Math.floor(rect.width));
        state.height = Math.max(1, Math.floor(rect.height));
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        const desktop = state.width >= 992;
        state.centerX = desktop ? 0.66 * state.width : 0.5 * state.width;
        state.centerY = desktop ? 0.5 * state.height : 0.62 * state.height;
        state.baseScale = desktop
          ? 0.58 * Math.min(0.6 * state.width, state.height)
          : 0.5 * Math.min(0.92 * state.width, 0.62 * state.height);
        draw(performance.now());
      }

      function cellPosition(idx, scale) {
        const unit = scale / 19;
        return [
          state.centerX + 2 * unit * (idx % 19 - 9),
          state.centerY + 2 * unit * (Math.floor(idx / 19) - 9),
        ];
      }

      function drawSprite(sprite, x, y, size) {
        if (size < 0.4) return;
        ctx.drawImage(sprite, x - size / 2, y - size / 2, size, size);
      }

      function getNameLayout() {
        const desktop = state.width >= 992;
        const wordWidth = desktop ? Math.min(0.76 * state.width, 1120) : Math.min(0.98 * state.width, 860);
        const unit = wordWidth / nameGrid.columns;
        if (unit < 1.55) return null;
        return {
          desktop,
          unit,
          originX: desktop ? 76 : 22,
          originY: desktop ? 54 : 28,
        };
      }

      function getNameSectionBounds(section, layout) {
        let left = Infinity;
        let top = Infinity;
        let right = -Infinity;
        let bottom = -Infinity;
        for (const cell of nameCells) {
          if (cell.section !== section) continue;
          const x = layout.originX + cell.cx * layout.unit;
          const y = layout.originY + cell.cy * layout.unit;
          const size = layout.unit * cell.sizeScale;
          left = Math.min(left, x - size / 2);
          top = Math.min(top, y - size / 2);
          right = Math.max(right, x + size / 2);
          bottom = Math.max(bottom, y + size / 2);
        }
        if (!Number.isFinite(left)) return null;
        return { left, top, right, bottom, centerY: (top + bottom) / 2 };
      }

      function drawNameCells(time) {
        if (!nameCells.length || !tileSprites.length || !shadowSprite) return;
        const layout = getNameLayout();
        if (!layout) return;
        const { desktop, originX, originY, unit } = layout;
        const elapsed = time - state.startedAt;
        const maxAlpha = desktop ? 0.84 : 0.68;

        for (const cell of nameCells) {
          const age = elapsed - 280 - cell.delay;
          const x = originX + cell.cx * unit;
          const y = originY + cell.cy * unit;
          const size = unit * cell.sizeScale;
          const spriteSet = tileSprites[cell.idx % tileSprites.length];
          if (age > -180) {
            const shadowAlpha = maxAlpha * 0.24 * easeOutCubic((age + 180) / 900);
            ctx.globalAlpha = shadowAlpha;
            drawSprite(pickMipMap(shadowSprite, size * 0.72 * state.dpr), x + unit * 0.12, y + unit * 0.16, size * 0.72);
          }
          if (age <= 0) {
            ctx.globalAlpha = maxAlpha * 0.18;
            drawSprite(spriteSet.solid, x, y, size);
            continue;
          }
          const fadeIn = easeOutCubic(age / 700);
          ctx.globalAlpha = maxAlpha * fadeIn;
          if (age < 700) {
            const frame = Math.min(7, Math.max(0, Math.floor(age / 700 * 8)));
            drawSprite(spriteSet.flip[frame], x, y, size);
          } else {
            drawSprite(pickMipMap(spriteSet.full, size * state.dpr), x, y, size);
            const solidAlpha = clamp((age - 700) / 1600);
            if (solidAlpha > 0) {
              ctx.globalAlpha = maxAlpha * solidAlpha;
              drawSprite(spriteSet.solid, x, y, size);
            }
          }
        }
        ctx.globalAlpha = 1;
      }

      function getEnergyLayout(time, scale) {
        if (state.width < 860 || state.height < 560) return null;
        const nameLayout = getNameLayout();
        if (!nameLayout) return null;

        const modelBounds = getNameSectionBounds("model", nameLayout);
        const makerBounds = getNameSectionBounds("maker", nameLayout);
        const heroRect = heroTitle
          ? heroTitle.getBoundingClientRect()
          : heroCopy.getBoundingClientRect();
        if (!modelBounds || !makerBounds || !heroRect.width) return null;

        const sources = [
          {
            x: modelBounds.right + 20,
            y: modelBounds.centerY + nameLayout.unit * 0.4,
            bend: -54,
          },
          {
            x: makerBounds.right + 20,
            y: makerBounds.centerY,
            bend: 0,
          },
          {
            x: heroRect.right + 24,
            y: heroRect.top + heroRect.height * 0.43,
            bend: 54,
          },
        ];
        const sourceRight = Math.max(...sources.map((source) => source.x));
        const mapLayout = getParticleMapLayout(time);
        const cityPoint = activeTheme.location
          ? projectMapPoint(activeTheme.location.lat, activeTheme.location.lon, mapLayout)
          : null;
        if (!cityPoint) return null;

        const merge = { x: cityPoint.x, y: cityPoint.y };

        return {
          sources,
          merge,
          target: merge,
        };
      }

      function drawCubic(points) {
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        ctx.bezierCurveTo(points[1].x, points[1].y, points[2].x, points[2].y, points[3].x, points[3].y);
      }

      function drawEnergyCurve(points, time, color, alpha, width, phase) {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 15;
        ctx.globalAlpha = alpha * 0.16;
        ctx.lineWidth = width + 8;
        drawCubic(points);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = alpha * 0.34;
        ctx.lineWidth = width + 2;
        ctx.setLineDash([2, 13]);
        ctx.lineDashOffset = -time * 0.036 - phase;
        drawCubic(points);
        ctx.stroke();

        ctx.globalAlpha = alpha * 0.86;
        ctx.lineWidth = width;
        ctx.setLineDash([11, 14]);
        ctx.lineDashOffset = -time * 0.068 - phase;
        drawCubic(points);
        ctx.stroke();
        ctx.restore();
      }

      function drawEnergyParticles(points, time, color, alpha, count, size, phase) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        for (let index = 0; index < count; index += 1) {
          const progress = (time * 0.00013 + phase + index / count) % 1;
          const point = cubicPoint(points, progress);
          const envelope = Math.sin(progress * Math.PI);
          const pulse = 0.82 + 0.18 * Math.sin(time * 0.008 + index * 1.7);
          ctx.globalAlpha = alpha * envelope * 0.82;
          ctx.beginPath();
          ctx.arc(point.x, point.y, size * pulse, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawEnergyFlow(time, scale) {
        const layout = getEnergyLayout(time, scale);
        if (!layout) return;

        const intro = 0.42 + 0.58 * easeOutCubic((time - state.startedAt - 180) / 900);

        const energyColor = activeTheme.solidColors[1] || activeTheme.activeBg;
        const branchColor = activeTheme.tileColors[3] || energyColor;
        for (let index = 0; index < layout.sources.length; index += 1) {
          const source = layout.sources[index];
          const direction = layout.merge.x >= source.x ? 1 : -1;
          const handle = clamp(Math.abs(layout.merge.x - source.x) * 0.36, 54, 118);
          const branchPath = [
            source,
            { x: source.x + direction * handle, y: source.y },
            { x: layout.merge.x - direction * handle, y: layout.merge.y + source.bend },
            layout.merge,
          ];
          drawEnergyCurve(branchPath, time, branchColor, intro * 0.72, 1.45, index * 18);
          drawEnergyParticles(branchPath, time, branchColor, intro, 2, 3.2, index * 0.21);
        }

        ctx.save();
        const beat = 0.5 + 0.5 * Math.sin(time * 0.006);
        ctx.strokeStyle = energyColor;
        ctx.fillStyle = energyColor;
        ctx.shadowColor = energyColor;
        ctx.shadowBlur = 18;
        ctx.globalAlpha = intro * (0.22 + beat * 0.18);
        ctx.beginPath();
        ctx.arc(layout.merge.x, layout.merge.y, 15 + beat * 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = intro * 0.88;
        ctx.beginPath();
        ctx.arc(layout.merge.x, layout.merge.y, 4.6 + beat * 1.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawCells(time, scale) {
        const unit = scale / 19;
        if (unit < 0.4) return;
        const size = 2 * unit * 0.78;
        for (const [idx, born] of state.cells) {
          const [x, y] = cellPosition(idx, scale);
          const spriteSet = tileSprites[idx % tileSprites.length];
          const age = time - born;
          if (age < 700) {
            const frame = Math.min(7, Math.max(0, Math.floor(age / 700 * 8)));
            drawSprite(spriteSet.flip[frame], x, y, size);
          } else {
            if (age < 2300) drawSprite(pickMipMap(spriteSet.full, size * state.dpr), x, y, size);
            const solidAlpha = clamp((age - 700) / 1600);
            if (solidAlpha > 0) {
              ctx.globalAlpha = solidAlpha;
              drawSprite(spriteSet.solid, x, y, size);
              ctx.globalAlpha = 1;
            }
          }
        }
      }

      function drawAgents(time, scale) {
        const unit = scale / 19;
        if (unit < 0.4) return;
        for (const agent of state.agents) {
          const travel = easeOutCubic((time - agent.since) / 450);
          const [fromX, fromY] = cellPosition(agent.prev, scale);
          const [toX, toY] = cellPosition(agent.idx, scale);
          const x = fromX + (toX - fromX) * travel;
          const y = fromY + (toY - fromY) * travel;
          let alpha = 1;
          if (agent.dieAt) alpha = Math.pow(1 - clamp((time - agent.dieAt) / 350), 2);
          else alpha = 1 - Math.pow(1 - clamp((time - agent.bornAt) / 350), 3);
          if (alpha <= 0) continue;
          ctx.globalAlpha = alpha;
          drawSprite(pickMipMap(agentSprite, 2 * unit * 0.78 * state.dpr), x, y, 2 * unit * 0.78);
          ctx.globalAlpha = 1;
        }
      }

      function updateZoom(time) {
        const filled = clamp(state.cells.size / totalReachable);
        const phaseTarget = -0.04 + 0.34 * filled;
        const target = (state.cycle + (state.doneAt ? 1 : phaseTarget)) * zoomSpan;
        const elapsed = state.lastFrameTime ? Math.min(50, time - state.lastFrameTime) : 16;
        state.lastFrameTime = time;
        const steps = Math.max(1, Math.ceil(elapsed / 12));
        const step = elapsed / steps;
        for (let i = 0; i < steps; i += 1) {
          const force = 0.00000081 * (target - state.zoom) - 0.00153 * state.zoomVelocity;
          state.zoomVelocity += force * step;
          state.zoom += state.zoomVelocity * step;
        }
      }

      function normalizeCycleWindow() {
        if (state.cycle < 24) return;
        const shift = 12;
        state.cycle -= shift;
        state.zoom -= shift * zoomSpan;
      }

      function draw(time = performance.now()) {
        ctx.clearRect(0, 0, state.width, state.height);
        ctx.fillStyle = palette.paper;
        ctx.fillRect(0, 0, state.width, state.height);
        updateZoom(time);
        const scale = state.baseScale * Math.exp(state.cycle * zoomSpan - state.zoom);
        drawPixelEarth(time);
        drawNameCells(time);
        drawEnergyFlow(time, scale);
        drawCells(time, scale);
        drawAgents(time, scale);
        drawTransition(time);
      }

      function drawTransition(time) {
        if (!state.transitionCanvas) return;
        const progress = clamp((time - state.transitionStartedAt) / state.transitionDuration);
        const alpha = Math.pow(1 - progress, 2);
        if (alpha <= 0.01) {
          state.transitionCanvas = null;
          return;
        }
        ctx.globalAlpha = alpha;
        ctx.drawImage(state.transitionCanvas, 0, 0, state.width, state.height);
        ctx.globalAlpha = 1;
      }

      function loop(time) {
        advanceGrowth(time);
        if (state.doneAt && time - state.doneAt >= 500) {
          state.cycle += 1;
          normalizeCycleWindow();
          rotateTheme(time);
        }
        draw(time);
        if (state.running) {
          state.raf = requestAnimationFrame(loop);
        }
      }

      window.addEventListener("resize", resize, { passive: true });

      applyTheme(activeTheme.id, false);
      resize();
      resetAnimation(performance.now(), false);
      state.raf = requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
